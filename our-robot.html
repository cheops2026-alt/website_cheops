<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Robot — Cheops</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="subpage-common.css">
  <link rel="stylesheet" href="our-robot.css">
</head>
<body class="subpage-body">
  <header class="subpage-header">
    <div class="subpage-header-inner">
      <a href="home.html" class="subpage-header-brand">
        <img src="assets/cheops.jpeg" alt="Cheops logo">
      </a>
      <div class="subpage-header-actions">
        <a href="home.html" class="subpage-btn subpage-btn-home">
          <i class="fas fa-home"></i> <span data-en="Home" data-ar="الرئيسية">Home</span>
        </a>
        <button type="button" id="langToggle" class="subpage-btn subpage-btn-lang" title="Toggle language">
          <span id="currentLang">EN</span>
          <i class="fas fa-globe"></i>
        </button>
        <button type="button" id="signOutBtn" class="subpage-btn subpage-btn-signout">
          <i class="fas fa-sign-out-alt"></i>
          <span data-en="Sign Out" data-ar="تسجيل الخروج">Sign Out</span>
        </button>
      </div>
    </div>
  </header>

  <main class="robot-main">
    <section class="robot-hero">
      <h1 data-en="Our Robot" data-ar="روبوتنا">Our Robot</h1>
      <p class="robot-lead" data-en="Meet the LEGO SPIKE Prime robot our team designed and programmed for the FLL Challenge."
         data-ar="تعرّف على روبوت LEGO SPIKE Prime الذي صممناه وبرمجناه لمسابقة FLL.">
        Meet the LEGO SPIKE Prime robot our team designed and programmed for the FLL Challenge.
      </p>
      <div class="robot-photo-wrap">
        <img src="assets/IMG-20251227-WA0007.jpg" alt="Cheops team robot built with yellow, white, and light blue LEGO SPIKE Prime parts and a central hub">
      </div>
      <p class="robot-note cv-placeholder" data-en="More photos and technical details will be added soon."
         data-ar="المزيد من الصور والتفاصيل قريباً.">
        More photos and technical details will be added soon.
      </p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC28sbqBffQQRNsv7DAckYTISBQmm82V-Q",
      authDomain: "cheops-26.firebaseapp.com",
      projectId: "cheops-26",
      storageBucket: "cheops-26.firebasestorage.app",
      messagingSenderId: "277043348468",
      appId: "1:277043348468:web:bc8fae2c84203914cdefa1",
      measurementId: "G-3BNYBLE2KL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'index.html';
    });

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'index.html';
      } catch (e) {
        console.error(e);
        alert('Error signing out.');
      }
    });
  </script>
  <script src="subpage-lang.js"></script>
</body>
</html>
